databases:
  - name: billy285-t24-crm-db
    databaseName: t24_crm
    user: t24_crm
    plan: free

services:
  - type: web
    name: billy285-t24-crm-backend
    runtime: python
    rootDir: app/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: billy285-t24-crm-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        value: https://billy285.github.io,https://t24-crm.vercel.app
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: None
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ADMIN_USER_ID
        value: admin
      - key: ADMIN_USER_EMAIL
        value: admin@company.com
      - key: ALLOW_INIT_ADMIN
        value: "false"
      - key: MGX_IGNORE_INIT_DATA
        value: "false"
      - key: MGX_IGNORE_INIT_EMP_ADMIN
        value: "false"
